<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map — Full Moon Festival 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    html, body { height: 100%; }

    #map {
      height: calc(100vh - var(--site-nav-h));
      width: 100%;
    }

    /* Dark popup to match festival theme */
    .leaflet-popup-content-wrapper {
      background: #141414;
      color: #fff;
      border: 1px solid rgba(42,255,0,0.3);
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.8);
      font-family: 'Inter', sans-serif;
    }
    .leaflet-popup-tip { background: #141414; }
    .leaflet-popup-close-button { color: rgba(255,255,255,0.5) !important; }
    .leaflet-popup-close-button:hover { color: #fff !important; }

    .popup-title {
      font-size: 14px;
      font-weight: 800;
      color: #2AFF00;
      margin-bottom: 4px;
    }
    .popup-sub {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      line-height: 1.5;
    }

    /* Opacity slider */
    #opacity-control {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: #141414;
      border: 1px solid rgba(42,255,0,0.3);
      border-radius: 10px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      white-space: nowrap;
    }
    #opacity-control label { color: #2AFF00; font-weight: 600; }
    #opacity-slider {
      -webkit-appearance: none;
      width: 140px;
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.15);
      outline: none;
    }
    #opacity-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #2AFF00;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(42,255,0,0.6);
    }
    #opacity-slider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #2AFF00;
      cursor: pointer;
      border: none;
    }

    /* Neon green custom marker */
    .fmf-pin {
      width: 22px;
      height: 22px;
      background: #2AFF00;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      border: 2px solid #000;
      box-shadow: 0 0 12px rgba(42,255,0,0.7);
    }
  </style>
</head>
<body>

  <header class="site-header">
    <img class="header-banner"
         src="Assets/THE FULLMOON FESTIVAL - BANNER - 1920 x 1005.png"
         alt="Full Moon Festival 2026">
  </header>

  <nav class="site-nav" aria-label="Site navigation">
    <a class="site-nav__link" href="https://www.thefullmoonfestival.co.uk/event-details-registration/the-full-moon-festival-2026" target="_blank" rel="noopener">Tickets</a>
    <a class="site-nav__link" href="lineup-poster.html">Lineup</a>
    <a class="site-nav__link" href="index.html">Timetable</a>
    <a class="site-nav__link active" href="map.html">Map</a>
  </nav>

  <div id="map"></div>

  <div id="opacity-control">
    <label for="opacity-slider">Map Opacity</label>
    <input type="range" id="opacity-slider" min="0" max="1" step="0.01" value="1">
    <span id="opacity-value">100%</span>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const LAT = 54.13855273175324;
    const LNG = -4.542921268817676;

    const map = L.map('map').setView([LAT, LNG], 15);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright" style="color:#2AFF00">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions" style="color:#2AFF00">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 19
    }).addTo(map);

    const pinIcon = L.divIcon({
      className: '',
      html: '<div class="fmf-pin"></div>',
      iconSize: [22, 22],
      iconAnchor: [11, 22],
      popupAnchor: [0, -24]
    });

    // 650m × 650m bounds centred on LAT/LNG, shifted 50m north
    // ~0.002920° lat per 325m, ~0.004975° lng per 325m at this latitude
    const svgBounds = [
      [LAT - 0.002920 + 0.000449 - 0.000180, LNG - 0.004975 - 0.000765],
      [LAT + 0.002920 + 0.000449 - 0.000180, LNG + 0.004975 - 0.000765]
    ];
    const RotatedOverlay = L.ImageOverlay.extend({
      _reset: function () {
        L.ImageOverlay.prototype._reset.call(this);
        const el = this._image;
        const rot = this.options.rotation || 0;
        el.style.transformOrigin = 'center';
        el.style.transform += ' rotate(' + rot + 'deg)';
      }
    });

    const svgOverlay = new RotatedOverlay('Assets/MAP.svg', svgBounds, { opacity: 1, rotation: 0 }).addTo(map);

    const slider = document.getElementById('opacity-slider');
    const opacityLabel = document.getElementById('opacity-value');
    slider.addEventListener('input', () => {
      svgOverlay.setOpacity(slider.value);
      opacityLabel.textContent = Math.round(slider.value * 100) + '%';
    });

    L.marker([LAT, LNG], { icon: pinIcon })
      .addTo(map)
      .bindPopup(`
        <div class="popup-title">Full Moon Festival 2026</div>
        <div class="popup-sub">
          Rose Hill Farm<br>
          Richmond Hill, Douglas<br>
          Isle of Man
        </div>
      `)
      .openPopup();
  </script>

</body>
</html>
