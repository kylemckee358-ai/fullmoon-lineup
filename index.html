<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Full Moon Festival 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/home.css">
</head>
<body>

  <header class="site-header">
    <img class="header-banner"
         src="Assets/THE FULLMOON FESTIVAL - BANNER - 1920 x 1005.png"
         alt="Full Moon Festival 2026 — 26th, 27th &amp; 28th June, Rose Hill Farm, Isle of Man">

  <main class="home-main">
    <div class="home-grid">

      <a class="home-tile home-tile--tickets"
         href="https://www.thefullmoonfestival.co.uk/event-details-registration/the-full-moon-festival-2026"
         target="_blank" rel="noopener">
        <div class="home-tile__icon">
          <svg viewBox="0 0 40 40" fill="none" aria-hidden="true">
            <path d="M4 14a3 3 0 0 1 0-4V8a2 2 0 0 1 2-2h28a2 2 0 0 1 2 2v2a3 3 0 0 1 0 4v2a3 3 0 0 1 0 4v2a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-2a3 3 0 0 1 0-4v-2z" stroke="currentColor" stroke-width="2.2" stroke-linejoin="round"/>

          </svg>
        </div>
        <div class="home-tile__label">Tickets</div>
        <div class="home-tile__sub">Buy now at thefullmoonfestival.co.uk</div>
      </a>

      <a class="home-tile" href="lineup.html">
        <div class="home-tile__icon">
          <svg viewBox="0 0 40 40" fill="none" aria-hidden="true">
            <rect x="6" y="8" width="28" height="4" rx="2" fill="currentColor" opacity=".9"/>
            <rect x="6" y="18" width="28" height="4" rx="2" fill="currentColor" opacity=".9"/>
            <rect x="6" y="28" width="18" height="4" rx="2" fill="currentColor" opacity=".9"/>
          </svg>
        </div>
        <div class="home-tile__label">Timetable</div>
        <div class="home-tile__sub">Full stage-by-stage lineup</div>
      </a>

      <a class="home-tile" href="map.html">
        <div class="home-tile__icon">
          <svg viewBox="0 0 40 40" fill="none" aria-hidden="true">
            <path d="M20 4C14.477 4 10 8.477 10 14c0 8.25 10 22 10 22s10-13.75 10-22c0-5.523-4.477-10-10-10z" stroke="currentColor" stroke-width="2.2" stroke-linejoin="round"/>
            <circle cx="20" cy="14" r="3.5" stroke="currentColor" stroke-width="2"/>
          </svg>
        </div>
        <div class="home-tile__label">Map</div>
        <div class="home-tile__sub">Site map &amp; directions</div>
      </a>

    </div>
