<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timetable — Full Moon Festival 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <img class="header-banner"
         src="Assets/THE FULLMOON FESTIVAL - BANNER - 1920 x 1005.png"
         alt="Full Moon Festival 2026 — 26th, 27th &amp; 28th June, Rose Hill Farm, Isle of Man">
  </header>

  <nav class="site-nav" aria-label="Site navigation">
    <a class="site-nav__link" href="https://www.thefullmoonfestival.co.uk/event-details-registration/the-full-moon-festival-2026" target="_blank" rel="noopener">Tickets</a>
    <a class="site-nav__link" href="lineup-poster.html">Lineup</a>
    <a class="site-nav__link active" href="index.html">Timetable</a>
    <a class="site-nav__link" href="map.html">Map</a>
  </nav>

  <nav class="day-nav" aria-label="Controls">
    <div class="day-nav-days">
      <button class="day-btn active" data-day="Friday">Fri</button>
      <button class="day-btn" data-day="Saturday">Sat</button>
      <button class="day-btn" data-day="Sunday">Sun</button>
    </div>
    <div class="view-toggle" role="tablist" aria-label="View">
      <button class="view-btn active" data-view="lineup" role="tab" aria-selected="true" title="List view">
        <svg width="16" height="16" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <rect x="2" y="3" width="14" height="2.5" rx="1.25" fill="currentColor"/>
          <rect x="2" y="7.75" width="14" height="2.5" rx="1.25" fill="currentColor"/>
          <rect x="2" y="12.5" width="14" height="2.5" rx="1.25" fill="currentColor"/>
        </svg>
        <span>list</span>
      </button>
      <button class="view-btn" data-view="timeline" role="tab" aria-selected="false" title="Blocks view">
        <svg width="16" height="16" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <rect x="2" y="3" width="6" height="5" rx="1.25" fill="currentColor"/>
          <rect x="10" y="3" width="6" height="5" rx="1.25" fill="currentColor"/>
          <rect x="2" y="10" width="9" height="5" rx="1.25" fill="currentColor"/>
          <rect x="13" y="10" width="3" height="5" rx="1.25" fill="currentColor"/>
        </svg>
        <span>blocks</span>
      </button>
    </div>
  </nav>

  <main id="app">
    <section id="lineup-view" class="view active" aria-label="Lineup view"></section>
    <section id="timeline-view" class="view" aria-label="Timeline view" aria-hidden="true"></section>
  </main>

  <script src="data/lineup.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
